version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: crm-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your environment}
      MYSQL_DATABASE: ${DB_NAME:-crm}
      MYSQL_USER: ${DB_USER:?Set DB_USER in your environment}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your environment}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in your environment}
      REFRESH_SECRET: ${REFRESH_SECRET:?Set REFRESH_SECRET in your environment}
      DB_HOST: db
      DB_USER: ${DB_USER:?Set DB_USER in your environment}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your environment}
      DB_NAME: ${DB_NAME:-crm}
      DB_PORT: 3306
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in your environment}
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in your environment}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in your environment}
    container_name: crm-frontend
    restart: always
    ports:
      - "80:80"

volumes:
  mysql_data:
